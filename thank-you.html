<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Europa Nova</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', serif;
    background: #f8f7f4;
    color: #1a2236;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .card {
    max-width: 560px;
    text-align: center;
    background: #fff;
    padding: 3rem 2.5rem;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 1rem;
    color: #1a2236;
  }
  p {
    font-size: 1rem;
    line-height: 1.7;
    color: #555;
    margin-bottom: 1.5rem;
  }
  a {
    display: inline-block;
    padding: 0.75rem 2rem;
    background: #1a2236;
    color: #fff;
    text-decoration: none;
    font-family: sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 2px;
  }
  a:hover { background: #2a3a56; }
</style>
</head>
<body>
<div class="card">
  <h1>Thank You</h1>
  <p>Your expression of support has been received. We will review your submission and be in touch if your endorsement is selected for publication.</p>
  <a href="https://europa-nova.eu">Return to Europa Nova</a>
</div>
</body>
</html>
